<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register user</title>
    <link rel="icon" type="image/png" href="icons/Home.png">
</head>
<body bgcolor="#0C407D">
    <center>
    <table border="1" align="center">
        <!-- Formulario de registro -->
        <form method="POST" action="ruta/a/tu/archivo/registrar.php">
            <!-- Firstname -->
            <tr><td><label for="fname">Firstname</label><br>
            <input type="text" name="fname" required><br></td></tr>

            <!-- Lastname -->
            <tr><td><label for="lname">Lastname</label><br>
            <input type="text" name="lname" required><br></td></tr>

            <!-- Email -->
            <tr><td><label for="email">Email</label><br>
            <input type="email" name="email" required><br></td></tr>

            <!-- Password -->
            <tr><td><label for="passwd">Password</label><br>
            <input type="password" name="passwd" required><br></td></tr>

            <!-- Confirm Password -->
            <tr><td><label for="passwd_confirm">Password again</label><br>
            <input type="password" name="passwd_confirm" required><br></td></tr>

            <!-- Mobile phone -->
            <tr><td><label for="mphone">Mobile phone</label><br>
            <input type="number" name="mphone" required><br><br></td></tr>

            <!-- Register button -->
            <tr><td><button type="submit">Register</button></td></tr>
        </form>
    </table>
    </center>
</body>
</html>
